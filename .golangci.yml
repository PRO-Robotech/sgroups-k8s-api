version: "2"

linters:
  # Standard preset: errcheck, govet, ineffassign, staticcheck (includes gosimple), unused
  default: standard

  enable:
    # Error handling
    - errorlint    # Correct error wrapping (%w) and comparison (errors.Is/As)
    - noctx        # Require context.Context in HTTP requests

    # Security
    - gosec        # Security-oriented checks

    # Code quality
    - gocritic     # Opinionated checks for bugs, performance, style
    - revive       # Extensible replacement for golint
    - unconvert    # Remove unnecessary type conversions
    - unparam      # Find unused function parameters

    # Complexity
    - gocognit     # Cognitive complexity
    - gocyclo      # Cyclomatic complexity
    - funlen       # Function length limits

    # Performance
    - prealloc     # Suggest slice preallocations
    - bodyclose    # Ensure HTTP response body is closed

    # Style
    - misspell     # Catch common English misspellings
    - goconst      # Find repeated strings → constants
    - dupl         # Detect code duplication
    - whitespace   # Detect leading/trailing whitespace issues
    - nlreturn     # Blank line before return/branch statements
    - lll          # Line length limit

    # --- NEW: Safety ---
    - nilerr          # nil error returns when err != nil
    - nilnil          # nil, nil returns
    - forcetypeassert # unsafe type assertions
    - nolintlint      # stale/invalid nolint directives

    # --- NEW: Performance & Style ---
    - perfsprint      # fmt.Errorf → errors.New for static strings
    - predeclared     # shadowing builtins (copy, len, etc.)
    - modernize       # interface{} → any, maps.Copy, etc.
    - nestif          # deeply nested ifs
    - nakedret        # naked returns in long functions
    - protogetter     # proto field access via getters

    # --- NEW: Test quality ---
    - testifylint     # testify correctness
    - usetesting      # testing package correctness
    - thelper          # t.Helper() in test helpers

    # --- NEW: Preventive ---
    - dupword         # duplicate words in comments
    - usestdlibvars   # prefer stdlib constants
    - reassign        # prevent package var reassignment
    - wastedassign    # unused assignments
    - recvcheck       # receiver consistency
    - fatcontext      # nested contexts in loops
    - intrange        # integer range loops
    - copyloopvar     # loop variable copies

  settings:
    funlen:
      lines: 100
      statements: 60

    gocognit:
      min-complexity: 20

    gocyclo:
      min-complexity: 12

    goconst:
      min-occurrences: 3
      ignore-tests: true

    dupl:
      threshold: 120

    nestif:
      min-complexity: 4

    lll:
      line-length: 140

    nakedret:
      max-func-lines: 3

    errcheck:
      check-type-assertions: true

    govet:
      enable-all: true
      disable:
        - shadow         # Too noisy for K8s code with err/ctx reuse
        - fieldalignment # K8s structs prioritize readability over packing

    revive:
      rules:
        - name: unused-parameter
          disabled: true   # K8s interfaces require specific signatures
        - name: exported
          disabled: true   # Excessive for internal packages
        - name: package-comments
          disabled: true

    gosec:
      excludes:
        - G101           # False positives on "token" in K8s API code

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

  exclusions:
    # Skip generated files (matched by content header or filename patterns)
    generated: lax

    paths:
      - vendor
      - '\.claude'
      - '\.idea'

    rules:
      # Relax complexity/security/context checks in tests
      - path: '_test\.go'
        linters:
          - funlen
          - gocognit
          - gocyclo
          - gosec
          - dupl
          - noctx
          - errcheck
          - nilerr         # poll-retry intentionally returns nil err
          - nestif
          - forcetypeassert
          - protogetter    # direct proto field access is fine in tests
          - lll            # test setup lines are often long

      # Relax checks in code generator (hack/resourcegen/)
      - path: 'hack/resourcegen/'
        linters:
          - funlen
          - gocognit
          - goconst
          - gosec
          - perfsprint
          - lll            # Go templates produce long lines

      # Seed loader reads files by design and has inherent complexity
      - path: 'internal/seed/'
        linters:
          - gosec
          - gocognit
          - gocyclo
          - nestif

      # Mock uses direct proto fields by design and has inherent complexity
      - path: 'internal/mock/'
        linters:
          - protogetter
          - nestif
          - dupl         # Namespace/AddressGroup methods are intentionally parallel
          - gocognit     # delete/filter methods have inherent complexity
          - gocyclo      # mock delete methods have inherent branching
          - lll          # proto type signatures exceed 140 chars

      # K8s API types follow K8s conventions (omitempty on struct fields, interface{} in OpenAPI)
      - path: 'pkg/apis/sgroups/v1alpha1/'
        linters:
          - modernize
          - recvcheck    # deepcopy (pointer) + OpenAPIModelName (value, required by interface)

      # Allow unchecked Close() in deferred calls
      - text: 'Error return value of .*(Close|Flush|Remove).*is not checked'
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - sgroups.io/sgroups-k8s-api
