apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.sgroups.io
  annotations:
    cert-manager.io/inject-ca-from: sgroups-system/sgroups-apiserver-cert
spec:
  group: sgroups.io
  version: v1alpha1
  groupPriorityMinimum: 1000
  versionPriority: 15
  service:
    name: sgroups-k8s-apiserver
    namespace: sgroups-system
  caBundle: ""
  insecureSkipTLSVerify: false
