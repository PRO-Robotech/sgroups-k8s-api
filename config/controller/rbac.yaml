apiVersion: v1
kind: ServiceAccount
metadata:
  name: sgroups-k8s-controller
  namespace: sgroups-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sgroups-k8s-controller
rules:
  - apiGroups: ["sgroups.io"]
    resources: ["tenants"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sgroups-k8s-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sgroups-k8s-controller
subjects:
  - kind: ServiceAccount
    name: sgroups-k8s-controller
    namespace: sgroups-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sgroups-k8s-controller-leader-election
  namespace: sgroups-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sgroups-k8s-controller-leader-election
  namespace: sgroups-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sgroups-k8s-controller-leader-election
subjects:
  - kind: ServiceAccount
    name: sgroups-k8s-controller
    namespace: sgroups-system
