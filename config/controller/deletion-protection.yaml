apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: sgroups-protect-tenant-namespace-deletion
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["DELETE"]
        resources: ["namespaces"]
  matchConditions:
    - name: only-managed
      expression: |
        has(oldObject.metadata.labels) &&
        "sgroups.io/managed-by" in oldObject.metadata.labels &&
        oldObject.metadata.labels["sgroups.io/managed-by"] == "tenant-controller"
  validations:
    - expression: |
        request.userInfo.username.startsWith("system:") ||
        (has(oldObject.metadata.annotations) &&
         "sgroups.io/allow-direct-delete" in oldObject.metadata.annotations &&
         oldObject.metadata.annotations["sgroups.io/allow-direct-delete"] == "true")
      message: >-
        Namespace is managed by the sgroups tenant-namespace controller.
        Delete the parent Tenant (kubectl delete tenant <name>) — this cascades the
        Namespace plus backend rows atomically. To force direct namespace deletion,
        first set annotation sgroups.io/allow-direct-delete=true on the namespace.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: sgroups-protect-tenant-namespace-deletion
spec:
  policyName: sgroups-protect-tenant-namespace-deletion
  validationActions: [Deny]
