apiVersion: v1
kind: ServiceAccount
metadata:
  name: sgroups-k8s-apiserver
  namespace: sgroups-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sgroups-k8s-apiserver
rules:
  - apiGroups: ["sgroups.io"]
    resources: ["tenants", "addressgroups"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Required by RecommendedOptions informers:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
      - validatingadmissionpolicies
      - validatingadmissionpolicybindings
      - mutatingadmissionpolicies
      - mutatingadmissionpolicybindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["flowschemas", "prioritylevelconfigurations"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sgroups-k8s-apiserver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sgroups-k8s-apiserver
subjects:
  - kind: ServiceAccount
    name: sgroups-k8s-apiserver
    namespace: sgroups-system
---
# Allow the SA to perform delegated authentication (TokenReview).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sgroups-k8s-apiserver:system:auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: sgroups-k8s-apiserver
    namespace: sgroups-system
---
# Allow the SA to read the extension-apiserver-authentication ConfigMap.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sgroups-k8s-apiserver:extension-apiserver-authentication-reader
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: sgroups-k8s-apiserver
    namespace: sgroups-system
